server:
  port: 8080

spring:
  application:
    name: mins-api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mins_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB

app:
  admin:
    email: ${ADMIN_EMAIL:admin@mins.in}
    password-hash: '${ADMIN_PASSWORD_HASH:$2a$10$GmbRwx6Sldq4mnsqs8eor.ij9FRfo80oREn536tOOyml8g8JLYiZO}'
  uploads:
    directory: mines_upload
  jwt:
    issuer: mins-api
    secret: "replace-this-development-secret-with-a-secure-production-secret"
    expiration-minutes: 480
